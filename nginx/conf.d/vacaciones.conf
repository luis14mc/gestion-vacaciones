# =============================================================
# Virtual Host: App Vacaciones CNI (Producción HTTPS)
# =============================================================
# Dominio: vacaciones.cni.hn
# Backend: contenedor cni-vacaciones en puerto 3000
# =============================================================

# Upstream para la app de vacaciones
upstream vacaciones_backend {
    server cni-vacaciones:3000;

    # Mantener conexiones vivas al backend (reduce latencia)
    keepalive 8;
}

# Redirigir todo el tráfico HTTP a HTTPS
server {
    listen 80;
    server_name vacaciones.cni.hn;
    
    return 301 https://$host$request_uri;
}

# Bloque HTTPS Principal
server {
    listen 443 ssl http2;
    server_name vacaciones.cni.hn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Protocolos modernos únicamente
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Buffers ampliados: respuestas de NextAuth (Set-Cookie JWT) pueden
    # superar el default de Nginx y provocar 502 "upstream sent too big header".
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 32k;

    # Rate limiting en login
    location /api/auth {
        limit_req zone=login_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Visor PDF de adjuntos: permite iframe same-origin sin relajar CSP del resto de la app.
    # Next.js envía frame-ancestors 'none'; aquí se sustituyen solo los headers que bloquean el iframe.
    location ~ ^/api/solicitudes/[0-9]+/adjuntos/[0-9]+/contenido$ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 60s;

        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;

        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self'; object-src 'self' blob: data:;" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Rate limiting en APIs
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout para operaciones largas (exportaciones, reportes)
        proxy_read_timeout 60s;
    }

    # Assets estáticos de Next.js (cachear agresivamente)
    location /_next/static/ {
        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Imágenes y archivos públicos
    location /assets/ {
        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Todo lo demás (páginas SSR)
    location / {
        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # No cachear páginas dinámicas
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
