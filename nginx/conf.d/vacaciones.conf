# =============================================================
# Virtual Host: App Vacaciones CNI
# =============================================================
# Dominio: vacaciones.cni.hn (CAMBIAR POR TU DOMINIO REAL)
# Backend: contenedor cni-vacaciones en puerto 3000
# =============================================================

# Upstream para la app de vacaciones
upstream vacaciones_backend {
    server cni-vacaciones:3000;

    # Mantener conexiones vivas al backend (reduce latencia)
    keepalive 8;
}

server {
    listen 80;
    server_name vacaciones.cni.hn;  # ← CAMBIAR POR TU DOMINIO

    # ─────────────────────────────────────────────────────
    # Redirigir todo HTTP → HTTPS (descomentar cuando tengas SSL)
    # ─────────────────────────────────────────────────────
    # return 301 https://$host$request_uri;

    # ─────────────────────────────────────────────────────
    # CONFIGURACIÓN SIN SSL (para desarrollo / inicial)
    # Cuando actives SSL, mover todo esto al bloque 443
    # ─────────────────────────────────────────────────────

    # Rate limiting en login
    location /api/auth {
        limit_req zone=login_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Rate limiting en APIs
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout para operaciones largas (exportaciones, reportes)
        proxy_read_timeout 60s;
    }

    # Assets estáticos de Next.js (cachear agresivamente)
    location /_next/static/ {
        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Cachear assets estáticos por 1 año (son hash-named)
        proxy_cache static_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Imágenes y archivos públicos
    location /assets/ {
        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Todo lo demás (páginas SSR)
    location / {
        proxy_pass http://vacaciones_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # No cachear páginas dinámicas
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

