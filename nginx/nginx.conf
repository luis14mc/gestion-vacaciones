# =============================================================
# Nginx Principal - EC2 t3.medium
# =============================================================
# Optimizado para baja memoria (~30-50MB máx)
# Sirve como reverse proxy para TODAS las apps del servidor
# =============================================================

user nginx;

# Auto-detecta CPUs (2 en t3.medium)
worker_processes auto;

# Límite de archivos abiertos
worker_rlimit_nofile 2048;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Conexiones simultáneas por worker
    worker_connections 1024;

    # Usar epoll en Linux para mejor rendimiento
    use epoll;

    # Aceptar múltiples conexiones a la vez
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─────────────────────────────────────────────────────
    # LOGGING (formato compacto para ahorrar disco)
    # ─────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ─────────────────────────────────────────────────────
    # RENDIMIENTO
    # ─────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Timeouts agresivos para liberar recursos rápido
    keepalive_timeout   30;
    client_body_timeout 15;
    client_header_timeout 15;
    send_timeout        15;

    # Tamaño máximo de cuerpo (subida de archivos)
    client_max_body_size 10M;

    # ─────────────────────────────────────────────────────
    # COMPRESIÓN GZIP
    # ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;       # Balance CPU/compresión (no 9, que es caro en CPU)
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─────────────────────────────────────────────────────
    # SEGURIDAD GLOBAL
    # ─────────────────────────────────────────────────────
    # Ocultar versión de Nginx
    server_tokens off;

    # Prevenir sniffing de MIME
    add_header X-Content-Type-Options "nosniff" always;

    # Prevenir clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS (forzar HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────────────────
    # RATE LIMITING (defensa contra DDoS básica)
    # ─────────────────────────────────────────────────────
    # Limitar a 10 req/s por IP para APIs
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Limitar a 5 req/s por IP para login
    limit_req_zone $binary_remote_addr zone=login_limit:5m rate=5r/s;

    # ─────────────────────────────────────────────────────
    # CACHÉ DE PROXY (aligerar carga al backend)
    # ─────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=static_cache:5m
        max_size=100m
        inactive=7d
        use_temp_path=off;

    # ─────────────────────────────────────────────────────
    # INCLUIR VIRTUAL HOSTS
    # ─────────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
